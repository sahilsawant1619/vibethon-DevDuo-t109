{% extends "base.html" %}
{% block content %}
<div class="leaderboard-container">
    <h1>🏆 Leaderboard</h1>
    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Points</th>
                <th>Level</th>
            </tr>
        </thead>
        <tbody>
            {% for user in leaderboard %}
            <tr {% if user.user_id == current_user.id %}class="current-user"{% endif %}>
                <td>{{ loop.index }}</td>
                <td>{{ user.fullname }}</td>
                <td>{{ user.points }}</td>
                <td>{{ user.level }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script src="{{ url_for('static', filename='js/leaderboard.js') }}"></script>
{% endblock %}
